# OPTIONAL paid alternative (Render + persistent disk).
# Default / recommended free path: Streamlit Community Cloud + GitHub Actions
# (see README.md). Only use this Blueprint if you want an always-on host with a
# mounted disk (~$7/mo Starter plan). Set ENABLE_INPROCESS_SCHEDULER=1 so the
# Beijing-midnight refresh runs inside the web process (Render cron jobs cannot
# share a disk with a web service).
services:
  - type: web
    name: baiguan-pro-index
    runtime: python
    plan: starter
    region: singapore
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    disk:
      name: baiguan-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.1"
      - key: DATA_DIR
        value: /var/data/data
      - key: BASKETS_DIR
        value: /var/data/baskets
      - key: ENABLE_INPROCESS_SCHEDULER
        value: "1"
      - key: APP_PASSWORD
        sync: false
      - key: EODHD_API_KEY
        sync: false
      - key: TUSHARE_TOKEN
        sync: false
