thesis: 'China’s vast and still-fast export engine has produced a large class of companies
  with real global influence. We screened Chinese companies listed in A-shares, Hong
  Kong and the U.S., using overseas revenue scale and global relevance as the primary
  test, with overseas growth, profitability and business quality as secondary filters.
  The result is the China Global Champions 30: thirty representative companies across
  five groups, together generating roughly USD 440 billion of overseas revenue. '
