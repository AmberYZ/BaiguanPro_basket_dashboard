tags: [dividends, buybacks, SOE, large-cap]
thesis: >
  Chinese companies - particularly SOEs and large-caps - have meaningfully
  accelerated buybacks and dividends over the past 18 months. This is a
  structural shift, not a one-off. In an environment where earnings growth can
  be uncertain, capital returns provide a floor. Popular dividend indices are
  heavily tilted toward banks and energy; we build a more balanced list where
  the yield is real, the balance sheet supports continuation, and the stock
  isn't already priced for it.
benchmarks: [CSI300, HSI, SPX]
